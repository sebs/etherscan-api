name: Release

# Fires when a version tag is pushed, e.g. created by `npm version <patch|minor|major>`
# (which bumps package.json and creates the matching tag).
on:
  push:
    tags:
      - 'v*'

# Needed for softprops/action-gh-release to create the GitHub release.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Read version from package.json
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="${{ steps.ver.outputs.version }}"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match package.json version '$pkg'."
            exit 1
          fi

      - name: Install
        run: npm install

      - name: Test
        run: npm test

      # `npm pack` produces the npm-native package tarball (.tgz), ready to upload.
      - name: Pack npm tarball
        run: |
          mkdir -p dist-artifacts
          npm pack --pack-destination dist-artifacts
          ls -la dist-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/*.tgz
          generate_release_notes: true
